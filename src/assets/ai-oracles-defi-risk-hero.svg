<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="AI oracles and DeFi risk — purple chart with volatile price feed and oracle nodes hovering above">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a3a"/>
      <stop offset="100%" stop-color="#0a0118"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0a0118" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#a78bfa" stroke-width="0.5" opacity="0.1"/>
    </pattern>
    <linearGradient id="areaFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <ellipse cx="600" cy="315" rx="500" ry="300" fill="url(#glow)"/>

  <!-- Axis -->
  <g stroke="#a78bfa" opacity="0.3" stroke-width="1">
    <line x1="120" y1="480" x2="1080" y2="480"/>
    <line x1="120" y1="200" x2="120" y2="480"/>
  </g>

  <!-- Volatile line chart -->
  <path d="M 120 420 L 200 380 L 280 430 L 360 300 L 440 360 L 520 260 L 600 330 L 680 220 L 760 380 L 840 290 L 920 410 L 1000 280 L 1080 340 L 1080 480 L 120 480 Z" fill="url(#areaFill)"/>
  <path d="M 120 420 L 200 380 L 280 430 L 360 300 L 440 360 L 520 260 L 600 330 L 680 220 L 760 380 L 840 290 L 920 410 L 1000 280 L 1080 340" fill="none" stroke="#c4b5fd" stroke-width="2"/>

  <!-- Oracle nodes above -->
  <g>
    <g>
      <circle cx="360" cy="160" r="18" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
      <circle cx="360" cy="160" r="8" fill="#ede9fe"/>
      <line x1="360" y1="175" x2="360" y2="300" stroke="#a78bfa" stroke-width="1" stroke-dasharray="3 3" opacity="0.6"/>
    </g>
    <g>
      <circle cx="680" cy="110" r="22" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
      <circle cx="680" cy="110" r="10" fill="#ede9fe"/>
      <line x1="680" y1="130" x2="680" y2="220" stroke="#a78bfa" stroke-width="1" stroke-dasharray="3 3" opacity="0.6"/>
    </g>
    <g>
      <circle cx="1000" cy="160" r="18" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
      <circle cx="1000" cy="160" r="8" fill="#ede9fe"/>
      <line x1="1000" y1="175" x2="1000" y2="280" stroke="#a78bfa" stroke-width="1" stroke-dasharray="3 3" opacity="0.6"/>
    </g>
  </g>

  <g font-family="ui-monospace, Menlo, monospace" font-size="11" fill="#a78bfa" opacity="0.8">
    <text x="338" y="145" text-anchor="middle">feed.A</text>
    <text x="680" y="90" text-anchor="middle">feed.B</text>
    <text x="1000" y="145" text-anchor="middle">feed.C</text>
  </g>

  <!-- Wordmark -->
  <g font-family="ui-monospace, Menlo, monospace" fill="#c4b5fd">
    <text x="80" y="100" font-size="14" opacity="0.7" letter-spacing="0.15em">AI ORACLES // DEFI RISK</text>
    <text x="80" y="570" font-size="18" fill="#a78bfa" letter-spacing="0.05em">0x156</text>
  </g>
</svg>
