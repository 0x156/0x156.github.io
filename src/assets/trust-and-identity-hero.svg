<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Trust when anyone can fake anything — purple silhouette face reflected multiple times, some real some synthetic, signatures floating between them">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a3a"/>
      <stop offset="100%" stop-color="#0a0118"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0a0118" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#a78bfa" stroke-width="0.5" opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <ellipse cx="600" cy="315" rx="520" ry="280" fill="url(#glow)"/>

  <!-- Five silhouette faces in a row. Center is signed/authentic, others are copies with glitch offset. -->
  <g>
    <!-- Face 1 — faint ghost -->
    <g opacity="0.28" transform="translate(170, 240)">
      <circle cx="60" cy="60" r="48" fill="none" stroke="#a78bfa" stroke-width="1"/>
      <path d="M 30 50 Q 40 42 50 50 M 70 50 Q 80 42 90 50" stroke="#a78bfa" stroke-width="1" fill="none"/>
      <path d="M 45 75 Q 60 82 75 75" stroke="#a78bfa" stroke-width="1" fill="none"/>
    </g>
    <!-- Face 2 — stronger ghost, offset -->
    <g opacity="0.5" transform="translate(345, 240)">
      <circle cx="60" cy="60" r="48" fill="none" stroke="#a78bfa" stroke-width="1.2"/>
      <path d="M 30 50 Q 40 42 50 50 M 70 50 Q 80 42 90 50" stroke="#a78bfa" stroke-width="1.2" fill="none"/>
      <path d="M 45 75 Q 60 82 75 75" stroke="#a78bfa" stroke-width="1.2" fill="none"/>
      <line x1="10" y1="60" x2="110" y2="62" stroke="#c4b5fd" stroke-width="1" opacity="0.6"/>
    </g>
    <!-- Face 3 — CENTER, bright, with signature ring -->
    <g transform="translate(540, 215)">
      <circle cx="60" cy="60" r="56" fill="none" stroke="#ede9fe" stroke-width="2"/>
      <circle cx="60" cy="60" r="48" fill="none" stroke="#c4b5fd" stroke-width="1.2"/>
      <path d="M 30 50 Q 40 42 50 50 M 70 50 Q 80 42 90 50" stroke="#ede9fe" stroke-width="1.6" fill="none"/>
      <path d="M 42 75 Q 60 84 78 75" stroke="#ede9fe" stroke-width="1.6" fill="none"/>
      <!-- Signature glyph -->
      <text x="60" y="160" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#ede9fe" text-anchor="middle" letter-spacing="0.1em">sig: 0x7c3a…</text>
    </g>
    <!-- Face 4 — copy with horizontal glitch line -->
    <g opacity="0.5" transform="translate(730, 240)">
      <circle cx="60" cy="60" r="48" fill="none" stroke="#a78bfa" stroke-width="1.2"/>
      <path d="M 30 50 Q 40 42 50 50 M 70 50 Q 80 42 90 50" stroke="#a78bfa" stroke-width="1.2" fill="none"/>
      <path d="M 45 78 Q 60 80 75 75" stroke="#a78bfa" stroke-width="1.2" fill="none"/>
      <line x1="10" y1="55" x2="110" y2="57" stroke="#c4b5fd" stroke-width="1" opacity="0.6"/>
    </g>
    <!-- Face 5 — faint ghost far right -->
    <g opacity="0.28" transform="translate(910, 240)">
      <circle cx="60" cy="60" r="48" fill="none" stroke="#a78bfa" stroke-width="1"/>
      <path d="M 30 50 Q 40 42 50 50 M 70 50 Q 80 42 90 50" stroke="#a78bfa" stroke-width="1" fill="none"/>
      <path d="M 45 75 Q 60 82 75 75" stroke="#a78bfa" stroke-width="1" fill="none"/>
    </g>
  </g>

  <!-- Signature glyphs floating between -->
  <g font-family="ui-monospace, Menlo, monospace" font-size="9" fill="#a78bfa" opacity="0.55">
    <text x="275" y="430">hash mismatch</text>
    <text x="460" y="430">verify→ok</text>
    <text x="680" y="430">verify→ok</text>
    <text x="840" y="430">hash mismatch</text>
  </g>

  <!-- Checkmarks/crosses under faces -->
  <g font-family="ui-monospace, Menlo, monospace" font-size="18">
    <text x="230" y="465" fill="#fca5a5" text-anchor="middle" opacity="0.7">✕</text>
    <text x="405" y="465" fill="#fca5a5" text-anchor="middle" opacity="0.7">✕</text>
    <text x="600" y="465" fill="#86efac" text-anchor="middle" opacity="0.95">✓</text>
    <text x="790" y="465" fill="#fca5a5" text-anchor="middle" opacity="0.7">✕</text>
    <text x="970" y="465" fill="#fca5a5" text-anchor="middle" opacity="0.7">✕</text>
  </g>

  <!-- Wordmark -->
  <g font-family="ui-monospace, Menlo, monospace" fill="#c4b5fd">
    <text x="80" y="100" font-size="14" opacity="0.7" letter-spacing="0.15em">TRUST // IDENTITY // PROVENANCE</text>
    <text x="80" y="570" font-size="18" fill="#a78bfa" letter-spacing="0.05em">0x156</text>
  </g>
</svg>
