<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="The privatization of civic infrastructure — a purple government building overshadowed by larger platform monoliths, with utility lines flowing from the platforms">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a3a"/>
      <stop offset="100%" stop-color="#0a0118"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0a0118" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#a78bfa" stroke-width="0.5" opacity="0.1"/>
    </pattern>
    <linearGradient id="platformGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#120530" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <ellipse cx="600" cy="380" rx="560" ry="260" fill="url(#glow)"/>

  <!-- Platform towers (dominant) -->
  <g>
    <rect x="120" y="160" width="110" height="360" fill="url(#platformGrad)" stroke="#a78bfa" stroke-width="1" opacity="0.9"/>
    <rect x="260" y="110" width="130" height="410" fill="url(#platformGrad)" stroke="#a78bfa" stroke-width="1" opacity="0.95"/>
    <rect x="420" y="180" width="100" height="340" fill="url(#platformGrad)" stroke="#a78bfa" stroke-width="1" opacity="0.9"/>
    <rect x="770" y="140" width="120" height="380" fill="url(#platformGrad)" stroke="#a78bfa" stroke-width="1" opacity="0.95"/>
    <rect x="920" y="200" width="110" height="320" fill="url(#platformGrad)" stroke="#a78bfa" stroke-width="1" opacity="0.9"/>
    <rect x="1060" y="170" width="90" height="350" fill="url(#platformGrad)" stroke="#a78bfa" stroke-width="1" opacity="0.9"/>
  </g>

  <!-- Window rows on platforms -->
  <g fill="#c4b5fd" opacity="0.35">
    <rect x="135" y="180" width="80" height="3"/><rect x="135" y="200" width="80" height="3"/>
    <rect x="135" y="220" width="80" height="3"/><rect x="135" y="240" width="80" height="3"/>
    <rect x="135" y="260" width="80" height="3"/><rect x="135" y="280" width="80" height="3"/>
    <rect x="275" y="130" width="100" height="3"/><rect x="275" y="150" width="100" height="3"/>
    <rect x="275" y="170" width="100" height="3"/><rect x="275" y="190" width="100" height="3"/>
    <rect x="275" y="210" width="100" height="3"/><rect x="275" y="230" width="100" height="3"/>
    <rect x="275" y="250" width="100" height="3"/><rect x="275" y="270" width="100" height="3"/>
    <rect x="435" y="200" width="70" height="3"/><rect x="435" y="220" width="70" height="3"/>
    <rect x="435" y="240" width="70" height="3"/><rect x="435" y="260" width="70" height="3"/>
    <rect x="435" y="280" width="70" height="3"/>
    <rect x="785" y="160" width="90" height="3"/><rect x="785" y="180" width="90" height="3"/>
    <rect x="785" y="200" width="90" height="3"/><rect x="785" y="220" width="90" height="3"/>
    <rect x="785" y="240" width="90" height="3"/>
    <rect x="935" y="220" width="80" height="3"/><rect x="935" y="240" width="80" height="3"/>
    <rect x="935" y="260" width="80" height="3"/>
    <rect x="1075" y="190" width="60" height="3"/><rect x="1075" y="210" width="60" height="3"/>
    <rect x="1075" y="230" width="60" height="3"/>
  </g>

  <!-- Small government building (dwarfed, center) -->
  <g>
    <polygon points="555,380 645,380 600,345" fill="#c4b5fd" opacity="0.7"/>
    <rect x="555" y="380" width="90" height="100" fill="none" stroke="#c4b5fd" stroke-width="1.5" opacity="0.75"/>
    <line x1="565" y1="400" x2="565" y2="480" stroke="#c4b5fd" stroke-width="1.5" opacity="0.7"/>
    <line x1="585" y1="400" x2="585" y2="480" stroke="#c4b5fd" stroke-width="1.5" opacity="0.7"/>
    <line x1="615" y1="400" x2="615" y2="480" stroke="#c4b5fd" stroke-width="1.5" opacity="0.7"/>
    <line x1="635" y1="400" x2="635" y2="480" stroke="#c4b5fd" stroke-width="1.5" opacity="0.7"/>
    <text x="600" y="510" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#c4b5fd" text-anchor="middle" letter-spacing="0.15em">GOV</text>
  </g>

  <!-- Utility lines flowing from platforms to government -->
  <g stroke="#a78bfa" stroke-width="1" stroke-dasharray="4 6" fill="none" opacity="0.55">
    <path d="M 325 280 Q 450 350 555 410"/>
    <path d="M 470 310 Q 520 350 555 400"/>
    <path d="M 830 270 Q 720 340 645 410"/>
    <path d="M 975 320 Q 800 370 645 420"/>
  </g>

  <!-- Ground line -->
  <line x1="0" y1="520" x2="1200" y2="520" stroke="#a78bfa" stroke-width="1" opacity="0.3"/>

  <!-- Wordmark -->
  <g font-family="ui-monospace, Menlo, monospace" fill="#c4b5fd">
    <text x="80" y="100" font-size="14" opacity="0.7" letter-spacing="0.15em">POWER // CIVIC INFRASTRUCTURE</text>
    <text x="80" y="580" font-size="18" fill="#a78bfa" letter-spacing="0.05em">0x156</text>
  </g>
</svg>
