<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Friendship in a medium of infinite throughput — purple network of dots with dense message streams, some connections brighter than others">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a3a"/>
      <stop offset="100%" stop-color="#0a0118"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0a0118" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#a78bfa" stroke-width="0.5" opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <ellipse cx="600" cy="315" rx="540" ry="300" fill="url(#glow)"/>

  <!-- Two central nodes (close friendship) -->
  <g>
    <circle cx="470" cy="315" r="14" fill="#ede9fe"/>
    <circle cx="470" cy="315" r="28" fill="none" stroke="#c4b5fd" stroke-width="1.5" opacity="0.6"/>
    <circle cx="730" cy="315" r="14" fill="#ede9fe"/>
    <circle cx="730" cy="315" r="28" fill="none" stroke="#c4b5fd" stroke-width="1.5" opacity="0.6"/>
    <!-- Strong link between them -->
    <line x1="484" y1="315" x2="716" y2="315" stroke="#ede9fe" stroke-width="2.5" opacity="0.9"/>
  </g>

  <!-- Many weak-tie nodes around -->
  <g fill="#a78bfa" opacity="0.6">
    <circle cx="180" cy="130" r="5"/>
    <circle cx="280" cy="170" r="5"/>
    <circle cx="200" cy="240" r="5"/>
    <circle cx="320" cy="320" r="5"/>
    <circle cx="240" cy="400" r="5"/>
    <circle cx="180" cy="490" r="5"/>
    <circle cx="320" cy="510" r="5"/>
    <circle cx="420" cy="490" r="5"/>
    <circle cx="500" cy="510" r="5"/>
    <circle cx="600" cy="480" r="5"/>
    <circle cx="700" cy="510" r="5"/>
    <circle cx="800" cy="490" r="5"/>
    <circle cx="900" cy="510" r="5"/>
    <circle cx="980" cy="470" r="5"/>
    <circle cx="1050" cy="400" r="5"/>
    <circle cx="980" cy="320" r="5"/>
    <circle cx="1030" cy="230" r="5"/>
    <circle cx="940" cy="170" r="5"/>
    <circle cx="820" cy="130" r="5"/>
    <circle cx="700" cy="150" r="5"/>
    <circle cx="600" cy="130" r="5"/>
    <circle cx="500" cy="150" r="5"/>
    <circle cx="400" cy="130" r="5"/>
  </g>

  <!-- Weak-tie links (thin) -->
  <g stroke="#7c3aed" stroke-width="0.6" opacity="0.35" fill="none">
    <line x1="470" y1="315" x2="180" y2="130"/>
    <line x1="470" y1="315" x2="280" y2="170"/>
    <line x1="470" y1="315" x2="200" y2="240"/>
    <line x1="470" y1="315" x2="320" y2="320"/>
    <line x1="470" y1="315" x2="240" y2="400"/>
    <line x1="470" y1="315" x2="180" y2="490"/>
    <line x1="470" y1="315" x2="320" y2="510"/>
    <line x1="470" y1="315" x2="420" y2="490"/>
    <line x1="470" y1="315" x2="500" y2="510"/>
    <line x1="470" y1="315" x2="600" y2="480"/>
    <line x1="470" y1="315" x2="500" y2="150"/>
    <line x1="470" y1="315" x2="400" y2="130"/>
    <line x1="470" y1="315" x2="600" y2="130"/>

    <line x1="730" y1="315" x2="820" y2="130"/>
    <line x1="730" y1="315" x2="700" y2="150"/>
    <line x1="730" y1="315" x2="940" y2="170"/>
    <line x1="730" y1="315" x2="1030" y2="230"/>
    <line x1="730" y1="315" x2="980" y2="320"/>
    <line x1="730" y1="315" x2="1050" y2="400"/>
    <line x1="730" y1="315" x2="980" y2="470"/>
    <line x1="730" y1="315" x2="900" y2="510"/>
    <line x1="730" y1="315" x2="800" y2="490"/>
    <line x1="730" y1="315" x2="700" y2="510"/>
    <line x1="730" y1="315" x2="600" y2="480"/>
    <line x1="730" y1="315" x2="600" y2="130"/>
  </g>

  <!-- Message stream particles along main link -->
  <g fill="#ede9fe">
    <circle cx="520" cy="308" r="1.5" opacity="0.95"/>
    <circle cx="560" cy="315" r="1.5" opacity="0.8"/>
    <circle cx="600" cy="322" r="1.5" opacity="0.95"/>
    <circle cx="640" cy="315" r="1.5" opacity="0.75"/>
    <circle cx="680" cy="308" r="1.5" opacity="0.9"/>
  </g>

  <!-- Wordmark -->
  <g font-family="ui-monospace, Menlo, monospace" fill="#c4b5fd">
    <text x="80" y="100" font-size="14" opacity="0.7" letter-spacing="0.15em">SOCIAL // INFINITE THROUGHPUT</text>
    <text x="80" y="580" font-size="18" fill="#a78bfa" letter-spacing="0.05em">0x156</text>
  </g>
</svg>
