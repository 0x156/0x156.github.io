<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Autonomous AI agents operating on-chain — abstract purple network of nodes connected by edges">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a3a"/>
      <stop offset="100%" stop-color="#0a0118"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0a0118" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#a78bfa" stroke-width="0.5" opacity="0.12"/>
    </pattern>
    <filter id="soft"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <circle cx="600" cy="315" r="360" fill="url(#glow)"/>

  <!-- Network edges -->
  <g stroke="#a78bfa" stroke-width="1" opacity="0.45" fill="none">
    <line x1="200" y1="180" x2="420" y2="300"/>
    <line x1="420" y1="300" x2="600" y2="160"/>
    <line x1="420" y1="300" x2="620" y2="440"/>
    <line x1="600" y1="160" x2="820" y2="260"/>
    <line x1="620" y1="440" x2="840" y2="480"/>
    <line x1="820" y1="260" x2="1000" y2="200"/>
    <line x1="820" y1="260" x2="980" y2="420"/>
    <line x1="200" y1="180" x2="300" y2="460"/>
    <line x1="300" y1="460" x2="620" y2="440"/>
  </g>

  <!-- Nodes -->
  <g>
    <circle cx="200" cy="180" r="14" fill="#7c3aed" filter="url(#soft)" opacity="0.7"/>
    <circle cx="200" cy="180" r="7" fill="#c4b5fd"/>
    <circle cx="420" cy="300" r="20" fill="#7c3aed" filter="url(#soft)" opacity="0.8"/>
    <circle cx="420" cy="300" r="10" fill="#ddd6fe"/>
    <circle cx="600" cy="160" r="16" fill="#7c3aed" filter="url(#soft)" opacity="0.7"/>
    <circle cx="600" cy="160" r="8" fill="#c4b5fd"/>
    <circle cx="820" cy="260" r="22" fill="#a78bfa" filter="url(#soft)" opacity="0.85"/>
    <circle cx="820" cy="260" r="11" fill="#ede9fe"/>
    <circle cx="1000" cy="200" r="14" fill="#7c3aed" filter="url(#soft)" opacity="0.7"/>
    <circle cx="1000" cy="200" r="7" fill="#c4b5fd"/>
    <circle cx="300" cy="460" r="14" fill="#7c3aed" filter="url(#soft)" opacity="0.7"/>
    <circle cx="300" cy="460" r="7" fill="#c4b5fd"/>
    <circle cx="620" cy="440" r="18" fill="#7c3aed" filter="url(#soft)" opacity="0.75"/>
    <circle cx="620" cy="440" r="9" fill="#ddd6fe"/>
    <circle cx="840" cy="480" r="14" fill="#7c3aed" filter="url(#soft)" opacity="0.7"/>
    <circle cx="840" cy="480" r="7" fill="#c4b5fd"/>
    <circle cx="980" cy="420" r="14" fill="#7c3aed" filter="url(#soft)" opacity="0.7"/>
    <circle cx="980" cy="420" r="7" fill="#c4b5fd"/>
  </g>

  <!-- Wordmark / label -->
  <g font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" fill="#c4b5fd">
    <text x="80" y="100" font-size="14" opacity="0.7" letter-spacing="0.15em">AUTONOMOUS AGENTS // ON-CHAIN</text>
    <text x="80" y="570" font-size="18" fill="#a78bfa" letter-spacing="0.05em">0x156</text>
  </g>
</svg>
