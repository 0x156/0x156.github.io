<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 560" width="560" height="560" role="img" aria-label="0x156 anonymous hacker avatar — hooded silhouette in purple, futuristic aesthetic">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a3a"/>
      <stop offset="100%" stop-color="#0a0118"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#7c3aed" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0a0118" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hoodGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1568"/>
      <stop offset="100%" stop-color="#120530"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="blurGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#a78bfa" stroke-width="0.5" opacity="0.12"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="560" height="560" fill="url(#bgGrad)"/>
  <rect width="560" height="560" fill="url(#grid)"/>
  <circle cx="280" cy="240" r="260" fill="url(#glow)"/>

  <!-- Concentric rings -->
  <g fill="none" stroke="#a78bfa" opacity="0.18">
    <circle cx="280" cy="280" r="215" stroke-width="1"/>
    <circle cx="280" cy="280" r="170" stroke-width="1"/>
    <circle cx="280" cy="280" r="125" stroke-width="1"/>
  </g>

  <!-- Shoulders -->
  <path d="M 90 560 Q 90 420 220 380 L 340 380 Q 470 420 470 560 Z" fill="url(#hoodGrad)" stroke="#7c3aed" stroke-width="1" opacity="0.95"/>

  <!-- Hood -->
  <path d="M 165 330 Q 165 170 280 150 Q 395 170 395 330 Q 395 390 360 430 L 200 430 Q 165 390 165 330 Z" fill="url(#hoodGrad)" stroke="#a78bfa" stroke-width="1.2" opacity="0.98"/>

  <!-- Face shadow oval -->
  <ellipse cx="280" cy="310" rx="85" ry="95" fill="#050010" opacity="0.95"/>

  <!-- Eyes — glitched glow bars -->
  <g filter="url(#blurGlow)">
    <rect x="238" y="288" width="26" height="6" rx="2" fill="#c4b5fd"/>
    <rect x="296" y="288" width="26" height="6" rx="2" fill="#c4b5fd"/>
  </g>
  <rect x="238" y="289" width="26" height="4" rx="1.5" fill="#e9d5ff"/>
  <rect x="296" y="289" width="26" height="4" rx="1.5" fill="#e9d5ff"/>

  <!-- Hood accent line -->
  <path d="M 170 330 Q 170 180 280 160 Q 390 180 390 330" fill="none" stroke="url(#accentGrad)" stroke-width="1.8" opacity="0.6"/>

  <!-- Digital glitch ticks along left -->
  <g fill="#a78bfa" opacity="0.55">
    <rect x="40" y="180" width="18" height="2"/>
    <rect x="40" y="200" width="36" height="2"/>
    <rect x="40" y="220" width="10" height="2"/>
    <rect x="40" y="240" width="24" height="2"/>
    <rect x="40" y="360" width="14" height="2"/>
    <rect x="40" y="380" width="30" height="2"/>
    <rect x="40" y="400" width="8" height="2"/>
  </g>

  <!-- Right side hex codes -->
  <g font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="11" fill="#a78bfa" opacity="0.55" text-anchor="end">
    <text x="520" y="200">0x7c3aed</text>
    <text x="520" y="222">0x2a1568</text>
    <text x="520" y="244">0x120530</text>
    <text x="520" y="380">sig: 0x156…</text>
    <text x="520" y="402">anon.pubkey</text>
  </g>

  <!-- Wordmark bottom right -->
  <g font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-weight="700" fill="#c4b5fd">
    <text x="40" y="520" font-size="26" letter-spacing="0.5">0x156</text>
    <text x="40" y="540" font-size="12" fill="#a59cc4" font-weight="400">anonymous // ai + web3</text>
  </g>
</svg>
