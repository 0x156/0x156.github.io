<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="When AI collapses the middle — purple org chart with the middle management layer dissolving into particles">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a3a"/>
      <stop offset="100%" stop-color="#0a0118"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0a0118" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#a78bfa" stroke-width="0.5" opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <ellipse cx="600" cy="315" rx="500" ry="280" fill="url(#glow)"/>

  <!-- Top layer: executive -->
  <g>
    <rect x="560" y="170" width="80" height="44" rx="8" fill="none" stroke="#ede9fe" stroke-width="1.5"/>
    <text x="600" y="198" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#ede9fe" text-anchor="middle" letter-spacing="0.1em">EXEC</text>
  </g>

  <!-- Connecting lines from exec to (dissolving) middle -->
  <g stroke="#a78bfa" stroke-width="1" stroke-dasharray="3 4" opacity="0.4">
    <line x1="600" y1="214" x2="300" y2="290"/>
    <line x1="600" y1="214" x2="450" y2="290"/>
    <line x1="600" y1="214" x2="600" y2="290"/>
    <line x1="600" y1="214" x2="750" y2="290"/>
    <line x1="600" y1="214" x2="900" y2="290"/>
  </g>

  <!-- Middle layer: dissolving into particles -->
  <g opacity="0.35">
    <rect x="264" y="290" width="72" height="36" rx="6" fill="none" stroke="#7c3aed" stroke-width="1" stroke-dasharray="2 3"/>
    <rect x="414" y="290" width="72" height="36" rx="6" fill="none" stroke="#7c3aed" stroke-width="1" stroke-dasharray="2 3"/>
    <rect x="564" y="290" width="72" height="36" rx="6" fill="none" stroke="#7c3aed" stroke-width="1" stroke-dasharray="2 3"/>
    <rect x="714" y="290" width="72" height="36" rx="6" fill="none" stroke="#7c3aed" stroke-width="1" stroke-dasharray="2 3"/>
    <rect x="864" y="290" width="72" height="36" rx="6" fill="none" stroke="#7c3aed" stroke-width="1" stroke-dasharray="2 3"/>
  </g>

  <!-- Particles drifting upward / away -->
  <g fill="#a78bfa" opacity="0.55">
    <circle cx="285" cy="275" r="1.5"/><circle cx="295" cy="265" r="1"/><circle cx="310" cy="260" r="1.5"/>
    <circle cx="330" cy="252" r="1"/><circle cx="345" cy="248" r="1.5"/>
    <circle cx="435" cy="270" r="1.5"/><circle cx="450" cy="260" r="1"/><circle cx="465" cy="252" r="1.5"/>
    <circle cx="585" cy="270" r="1"/><circle cx="600" cy="258" r="1.5"/><circle cx="615" cy="250" r="1"/>
    <circle cx="735" cy="275" r="1.5"/><circle cx="750" cy="265" r="1"/><circle cx="770" cy="255" r="1.5"/>
    <circle cx="885" cy="270" r="1"/><circle cx="900" cy="258" r="1.5"/><circle cx="920" cy="250" r="1"/>
  </g>

  <!-- Dashed arrow from exec straight down bypassing middle -->
  <g stroke="#c4b5fd" stroke-width="1.5" stroke-dasharray="6 6" fill="none" opacity="0.85">
    <line x1="600" y1="214" x2="600" y2="400"/>
  </g>
  <polygon points="595,398 605,398 600,412" fill="#c4b5fd" opacity="0.9"/>

  <!-- Bottom layer: contributors -->
  <g>
    <rect x="120" y="420" width="70" height="36" rx="6" fill="none" stroke="#c4b5fd" stroke-width="1.2"/>
    <rect x="250" y="420" width="70" height="36" rx="6" fill="none" stroke="#c4b5fd" stroke-width="1.2"/>
    <rect x="380" y="420" width="70" height="36" rx="6" fill="none" stroke="#c4b5fd" stroke-width="1.2"/>
    <rect x="510" y="420" width="70" height="36" rx="6" fill="#a78bfa" stroke="#c4b5fd" stroke-width="1.2" opacity="0.2"/>
    <rect x="510" y="420" width="70" height="36" rx="6" fill="none" stroke="#ede9fe" stroke-width="1.5"/>
    <rect x="640" y="420" width="70" height="36" rx="6" fill="none" stroke="#c4b5fd" stroke-width="1.2"/>
    <rect x="770" y="420" width="70" height="36" rx="6" fill="none" stroke="#c4b5fd" stroke-width="1.2"/>
    <rect x="900" y="420" width="70" height="36" rx="6" fill="none" stroke="#c4b5fd" stroke-width="1.2"/>
    <rect x="1030" y="420" width="70" height="36" rx="6" fill="none" stroke="#c4b5fd" stroke-width="1.2"/>
  </g>

  <!-- Wordmark -->
  <g font-family="ui-monospace, Menlo, monospace" fill="#c4b5fd">
    <text x="80" y="100" font-size="14" opacity="0.7" letter-spacing="0.15em">WORK // THE ORG CHART COLLAPSES</text>
    <text x="80" y="570" font-size="18" fill="#a78bfa" letter-spacing="0.05em">0x156</text>
  </g>
</svg>
