<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Zero-knowledge machine learning proofs — abstract purple circuit with validator nodes and proof stream">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a3a"/>
      <stop offset="100%" stop-color="#0a0118"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0a0118" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#a78bfa" stroke-width="0.5" opacity="0.1"/>
    </pattern>
    <linearGradient id="stream" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a78bfa" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <ellipse cx="600" cy="315" rx="480" ry="280" fill="url(#glow)"/>

  <!-- Model box on left -->
  <g>
    <rect x="120" y="215" width="220" height="200" rx="14" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.7"/>
    <text x="230" y="180" font-family="ui-monospace, Menlo, monospace" font-size="14" fill="#c4b5fd" text-anchor="middle" letter-spacing="0.1em">MODEL f(x)</text>
    <g font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#a78bfa" opacity="0.75">
      <text x="140" y="245">▓▓▓▓▓▓▓▓▓▓▓▓▓▓</text>
      <text x="140" y="265">▓▓▓▓ ▓▓ ▓▓▓▓▓▓</text>
      <text x="140" y="285">▓▓▓▓▓▓▓▓ ▓▓▓▓▓</text>
      <text x="140" y="305">▓ ▓▓▓▓▓▓▓▓▓▓▓▓</text>
      <text x="140" y="325">▓▓▓▓▓▓ ▓▓▓▓▓▓▓</text>
      <text x="140" y="345">▓▓▓ ▓▓▓▓▓▓▓▓▓▓</text>
      <text x="140" y="365">▓▓▓▓▓▓▓▓▓▓ ▓▓▓</text>
      <text x="140" y="385">▓▓▓▓▓ ▓▓▓▓▓▓▓▓</text>
    </g>
  </g>

  <!-- Proof stream arrow -->
  <g>
    <rect x="360" y="305" width="480" height="20" rx="10" fill="url(#stream)"/>
    <text x="600" y="295" font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#c4b5fd" text-anchor="middle" letter-spacing="0.15em">zk-SNARK π</text>
  </g>

  <!-- Verifier on right -->
  <g>
    <polygon points="860,215 1080,315 860,415 900,315" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.8"/>
    <text x="970" y="180" font-family="ui-monospace, Menlo, monospace" font-size="14" fill="#c4b5fd" text-anchor="middle" letter-spacing="0.1em">VERIFIER</text>
    <text x="940" y="325" font-family="ui-monospace, Menlo, monospace" font-size="20" fill="#ede9fe" text-anchor="middle">✓</text>
  </g>

  <!-- Wordmark -->
  <g font-family="ui-monospace, Menlo, monospace" fill="#c4b5fd">
    <text x="80" y="100" font-size="14" opacity="0.7" letter-spacing="0.15em">ZERO-KNOWLEDGE // MACHINE LEARNING</text>
    <text x="80" y="570" font-size="18" fill="#a78bfa" letter-spacing="0.05em">0x156</text>
  </g>
</svg>
