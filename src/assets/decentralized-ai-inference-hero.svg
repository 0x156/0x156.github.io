<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Decentralized AI inference economics — purple mesh of GPU nodes serving requests across a network">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a3a"/>
      <stop offset="100%" stop-color="#0a0118"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0a0118" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#a78bfa" stroke-width="0.5" opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <circle cx="600" cy="315" r="380" fill="url(#glow)"/>

  <!-- Hexagon grid of nodes -->
  <g>
    <g fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.5">
      <polygon points="240,200 270,185 300,200 300,235 270,250 240,235"/>
      <polygon points="340,160 370,145 400,160 400,195 370,210 340,195"/>
      <polygon points="340,240 370,225 400,240 400,275 370,290 340,275"/>
      <polygon points="440,200 470,185 500,200 500,235 470,250 440,235"/>
      <polygon points="440,280 470,265 500,280 500,315 470,330 440,315"/>
      <polygon points="540,240 570,225 600,240 600,275 570,290 540,275"/>
      <polygon points="640,200 670,185 700,200 700,235 670,250 640,235"/>
      <polygon points="640,280 670,265 700,280 700,315 670,330 640,315"/>
      <polygon points="740,240 770,225 800,240 800,275 770,290 740,275"/>
      <polygon points="840,200 870,185 900,200 900,235 870,250 840,235"/>
      <polygon points="840,280 870,265 900,280 900,315 870,330 840,315"/>
      <polygon points="940,240 970,225 1000,240 1000,275 970,290 940,275"/>
    </g>
    <!-- Active / "paid" nodes highlighted -->
    <g fill="#a78bfa" opacity="0.9">
      <circle cx="370" cy="175" r="5"/>
      <circle cx="470" cy="215" r="5"/>
      <circle cx="570" cy="255" r="5"/>
      <circle cx="670" cy="215" r="5"/>
      <circle cx="770" cy="255" r="5"/>
      <circle cx="870" cy="215" r="5"/>
    </g>
  </g>

  <!-- Request arrow and reward arrow -->
  <g font-family="ui-monospace, Menlo, monospace" fill="#c4b5fd" font-size="13">
    <path d="M 120 420 Q 600 500 1080 420" fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.8" stroke-dasharray="4 4"/>
    <text x="600" y="500" text-anchor="middle" letter-spacing="0.12em">REQUEST → INFERENCE → PAYMENT</text>
    <circle cx="120" cy="420" r="6" fill="#ede9fe"/>
    <circle cx="1080" cy="420" r="6" fill="#ede9fe"/>
    <text x="110" y="405" text-anchor="end" fill="#a78bfa">client</text>
    <text x="1090" y="405" fill="#a78bfa">provider</text>
  </g>

  <!-- Wordmark -->
  <g font-family="ui-monospace, Menlo, monospace" fill="#c4b5fd">
    <text x="80" y="100" font-size="14" opacity="0.7" letter-spacing="0.15em">DECENTRALIZED // AI INFERENCE</text>
    <text x="80" y="570" font-size="18" fill="#a78bfa" letter-spacing="0.05em">0x156</text>
  </g>
</svg>
